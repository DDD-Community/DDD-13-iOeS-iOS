name: Valid Build

on:
  pull_request:
    branches:
      - develop
  workflow_dispatch:

jobs:
  valid-build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup mise and Tuist
        uses: jdx/mise-action@v4
        with:
          mise_toml: |
            [tools]
            tuist = "4.174.2"

      - name: Restore local config files
        env:
          COMMON_XCCONFIG_TEST: ${{ secrets.COMMON_XCCONFIG_TEST }}
          GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_B64 }}
        run: |
          set -euo pipefail

          test -n "$COMMON_XCCONFIG_TEST"
          test -n "$GOOGLE_SERVICE_INFO_PLIST_B64"

          mkdir -p Configs

          printf '%s\n' "$COMMON_XCCONFIG_TEST" > Configs/Common.xcconfig

          printf '%s' "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > Configs/GoogleService-Info.plist || \
          printf '%s' "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 -D > Configs/GoogleService-Info.plist

      - name: Generate project
        run: tuist generate --no-open

      - name: Build Pickflow
        run: |
          set -euo pipefail

          xcodebuild \
            -workspace Pickflow.xcworkspace \
            -scheme Pickflow \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
